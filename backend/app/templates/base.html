<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Админка{% endblock %} — Сохраняя жизни</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        .nav { background: #3E2723; color: #fff; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .nav a { color: #FFE0B2; text-decoration: none; margin-left: 16px; }
        .nav a:hover { color: #fff; }
        .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { margin-bottom: 16px; color: #3E2723; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #FFF8E1; color: #3E2723; font-weight: 600; }
        .btn { display: inline-block; padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; text-decoration: none; }
        .btn--primary { background: #FF6F00; color: #fff; }
        .btn--primary:hover { background: #E65100; }
        .btn--danger { background: #c62828; color: #fff; }
        .btn--danger:hover { background: #b71c1c; }
        .btn--small { padding: 4px 10px; font-size: 0.8rem; }
        .status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
        .status--new { background: #FFF3E0; color: #E65100; }
        .status--reviewed { background: #E3F2FD; color: #1565C0; }
        .status--approved { background: #E8F5E9; color: #2E7D32; }
        .status--rejected { background: #FFEBEE; color: #C62828; }
        .stats-row { display: flex; gap: 24px; margin-bottom: 24px; }
        .stat-box { flex: 1; background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-box__number { font-size: 2rem; font-weight: 700; color: #FF6F00; }
        .stat-box__label { color: #666; margin-top: 4px; }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
        .form-row label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.85rem; }
        .form-row input, .form-row textarea, .form-row select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
        .form-row textarea { min-height: 80px; resize: vertical; }
        .pet-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>
    <nav class="nav">
        <strong>Сохраняя жизни — Админка</strong>
        <div>
            <a href="/admin/dashboard">Панель</a>
            <a href="/" target="_blank">Сайт</a>
            <a href="/admin/logout">Выйти</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
