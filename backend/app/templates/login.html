<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Админка</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FFF8E1; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .login-box h1 { text-align: center; color: #3E2723; margin-bottom: 8px; font-size: 1.5rem; }
        .login-box p { text-align: center; color: #888; margin-bottom: 24px; font-size: 0.9rem; }
        .login-box label { display: block; font-weight: 600; margin-bottom: 4px; color: #3E2723; font-size: 0.9rem; }
        .login-box input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; margin-bottom: 16px; }
        .login-box button { width: 100%; padding: 12px; background: #FF6F00; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .login-box button:hover { background: #E65100; }
        .error { background: #FFEBEE; color: #C62828; padding: 10px; border-radius: 8px; margin-bottom: 16px; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Сохраняя жизни</h1>
        <p>Вход в админ-панель</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/admin/login">
            <label>Имя пользователя</label>
            <input type="text" name="username" required autofocus>
            <label>Пароль</label>
            <input type="password" name="password" required>
            <button type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
